<section id="products" class="section">
  <h2>Our Products</h2>

  <div class="products">
    <div class="card" *ngFor="let item of products">

      <h3>{{ item.name }}</h3>
      <p class="price">₱{{ item.price }}</p>

      <p class="stock">
        Stock: 
        <span [class.out]="item.stock === 0">
          {{ item.stock }}
        </span>
      </p>

      <div class="buttons">
        <button 
          (click)="addToCart(item)" 
          [disabled]="item.stock === 0"
          [class.soldout]="item.stock === 0">
          Add to Cart
        </button>

       
      </div>

    </div>
  </div>
</section>
